services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: max_chat_bot
      POSTGRES_USER: maxchat
      POSTGRES_PASSWORD: maxchat
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U maxchat -d max_chat_bot"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  backend-api:
    build:
      context: .
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      DATABASE_URL: postgresql+psycopg://maxchat:maxchat@postgres:5432/max_chat_bot
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health/ready', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 5

  backend-worker:
    build:
      context: .
    restart: unless-stopped
    command: sh -c "python -m max_chat_backend.scripts.migrate && celery -A max_chat_backend.tasks.celery_app:celery_app worker -l info"
    env_file:
      - ./.env
    environment:
      DATABASE_URL: postgresql+psycopg://maxchat:maxchat@postgres:5432/max_chat_bot
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    build:
      context: ../max_chat_frontend
    restart: unless-stopped
    env_file:
      - ../max_chat_frontend/.env
    environment:
      BACKEND_BASE_URL: http://backend-api:8000
    depends_on:
      backend-api:
        condition: service_started
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  postgres_data:
