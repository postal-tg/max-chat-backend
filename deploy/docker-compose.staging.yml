services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  backend-api:
    build:
      context: ..
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health/ready', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 5

  backend-worker:
    build:
      context: ..
    restart: unless-stopped
    command: sh -c "python -m max_chat_backend.scripts.migrate && celery -A max_chat_backend.tasks.celery_app:celery_app worker -l info"
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    build:
      context: ../../max_chat_frontend
    restart: unless-stopped
    env_file:
      - ../../max_chat_frontend/.env
    environment:
      BACKEND_BASE_URL: http://backend-api:8000
    depends_on:
      backend-api:
        condition: service_started

  caddy:
    image: caddy:2.10-alpine
    restart: unless-stopped
    environment:
      BACKEND_DOMAIN: ${BACKEND_DOMAIN}
      FRONTEND_DOMAIN: ${FRONTEND_DOMAIN}
      BACKEND_INTERNAL_PORT: ${BACKEND_INTERNAL_PORT}
      FRONTEND_INTERNAL_PORT: ${FRONTEND_INTERNAL_PORT}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      backend-api:
        condition: service_started
      frontend:
        condition: service_started

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
